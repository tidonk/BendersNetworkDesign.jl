# GitLab CI configuration for BendersNetworkDesign.jl

variables:
  JULIA_NUM_THREADS: "auto"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

stages:
  - build
  - test
  - docs

build:
  stage: build
  image: docker:20.10
  services:
    - docker:20.10-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
    - master

test:
  stage: test
  image: $CI_REGISTRY_IMAGE:latest
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY || true
  script:
    - julia --project=. -e 'using Pkg; Pkg.instantiate()'
    - julia --project=. -e 'using TestReports; TestReports.test("BendersNetworkDesign"; coverage=true)'
    - julia --project=. test/enhance_junit_xml.jl testlog.xml
    - echo "Coverage files generated:"
    - find . -name "*.cov" -type f
    - julia --project=. test/coverage_report.jl
    - julia --project=. -e 'using Coverage; coverage = process_folder("src"); covered, total = get_summary(coverage); println("COVERAGE=", round(100*covered/total, digits=2), "%")'
  coverage: '/COVERAGE=(\d+\.?\d*)%/'
  artifacts:
    paths:
      - "**/*.cov"
      - testlog.xml
      - coverage.lcov
      - coverage.xml
    reports:
      junit: testlog.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  needs:
    - build
  only:
    - main
    - master
    - merge_requests

pages:
  stage: docs
  image: $CI_REGISTRY_IMAGE:latest
  before_script:
    - julia --project=docs -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
  script:
    - julia --project=docs docs/make.jl
    - mv docs/build public
  artifacts:
    paths:
      - public
  only:
    - main
    - master
  needs:
    - test