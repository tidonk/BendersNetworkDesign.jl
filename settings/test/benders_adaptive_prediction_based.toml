# Prediction-based adaptive selection (ML predicts proportion of subproblems that will yield cuts)
# For testing the ML proportion predictor

[MODEL]
model_type = "benders"

[SCENARIOS]
num_outage_scenarios = 20

[LOGGING]
subproblem_log = true  # Enable to see ML prediction output
statistics = true

[BENDERS.SUBPROBLEM_SELECTION]
strategy = "adaptive"

    [BENDERS.SUBPROBLEM_SELECTION.adaptive]
    mode = "prediction_based"
    
        [BENDERS.SUBPROBLEM_SELECTION.adaptive.prediction_based]
        learning_rate = 0.01
        regularization = 0.01
        history_decay = 0.9
        default_proportion = 0.5
        min_proportion = 0.05
        max_proportion = 1.0
        min_training_rate = 0.5  # Avoid recall bias: only train if we solved ≥50% of scenarios

[BENDERS.SUBPROBLEM_SCORING]
ordering = "score"

    [BENDERS.SUBPROBLEM_SCORING.score]
    weights = [0.05, 0.0, 0.8, 0.05, 0.1, 0.0]  # No ML subproblem scoring (complementary goals)
